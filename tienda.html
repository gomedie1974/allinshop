<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda | All In Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/img/ALLINSHOP.png">
  <link rel="apple-touch-icon" href="./assets/img/ALLINSHOP.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    /* FIX: Evita que el Navbar tape el título */
    .page-hero {
        padding-top: 150px; /* Espacio para el nav en PC */
        padding-bottom: 60px;
        background-color: #f8f9fa; /* Un fondo sutil queda bien */
    }

    @media (max-width: 768px) {
        .page-hero {
            padding-top: 150px; /* Más espacio en móviles */
            padding-bottom: 40px;
        }
        .page-hero h1 { font-size: 2rem; }
    }

    .product-card { background: #fff; border-radius: 8px; overflow: hidden; transition: 0.3s; height: 100%; border: 1px solid #eee; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .product-card img {width: 100%; aspect-ratio: 1/1; object-fit: contain; background-color: #f8f9fa; padding: 10px; }
    .price { color: #d4af37; font-weight: 700; font-size: 1.2rem; }
    
    /* Estilos para el Zoom */
    .img-zoomable { cursor: zoom-in; transition: 0.3s; }
    .img-zoomable:hover { filter: brightness(0.9); }
    #modalZoomImage { cursor: zoom-out; display: block; margin: 0 auto; max-height: 90vh; }
  /* Contenedor principal de filtros */
.filtros-wrapper {
    overflow-x: auto; /* Permite scroll lateral si no entran */
    white-space: nowrap;
    padding: 10px 0;
    -webkit-overflow-scrolling: touch; /* Suavidad en iOS */
}

.filtros {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap; /* En PC se envuelven, en móvil se ajustan */
}

/* Estilo de los botones de filtro */
.filtro-btn {
    padding: 8px 20px;
    border: 2px solid #d4af37; /* Color oro como tu precio */
    background: transparent;
    color: #333;
    border-radius: 25px;
    font-weight: 600;
    transition: all 0.3s ease;
    cursor: pointer;
    white-space: nowrap;
}

.filtro-btn.active, .filtro-btn:hover {
    background: #d4af37;
    color: white;
}

/* Ajuste para móviles: Scroll lateral suave */
@media (max-width: 768px) {
    .filtros-wrapper {
        padding: 10px 15px;
        margin-bottom: 10px;
        /* Oculta la barra de scroll visualmente pero permite el movimiento */
        scrollbar-width: none; 
    }
    .filtros-wrapper::-webkit-scrollbar {
        display: none;
    }
    .filtros {
        justify-content: flex-start; /* Alinea al inicio */
        flex-wrap: nowrap; /* Fuerza una sola línea */
        gap: 8px;
    }
    .filtro-btn {
        font-size: 0.85rem; /* Un poco más chicos para que entren más */
        padding: 6px 15px;
    }
}    
</style>

<body>
  <div id="navbar-container"></div>

  <section class="page-hero d-flex align-items-center">
    <div class="container text-center">
      <h1 class="fw-bold">Estilo y Utilidad</h1>
      <p class="lead">Indumentaria exclusiva y accesorios prácticos para tu día a día.</p>
    </div>
  </section>
   
 
    <div class="container mt-4">
        <div class="filtros-wrapper d-none d-md-block">
            <div class="filtros">
                <button type="button" class="filtro-btn active" data-categoria="todos">Todos</button>
                <button type="button" class="filtro-btn" data-categoria="hogar">Hogar</button>
                <button type="button" class="filtro-btn" data-categoria="indumentaria">Indumentaria</button>
                <button type="button" class="filtro-btn" data-categoria="luncheras">Luncheras</button>
            </div>
        </div>

        <div class="d-md-none text-start mb-3">
            <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasFiltros">
                <i class="bi bi-filter-left"></i> Filtrar Categorías
            </button>
        </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasFiltros">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Categorías</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <div class="d-grid gap-2">
            <button type="button" class="btn btn-light text-start filtro-btn active" data-categoria="todos" data-bs-dismiss="offcanvas">Todos</button>
            <button type="button" class="btn btn-light text-start filtro-btn" data-categoria="hogar" data-bs-dismiss="offcanvas">Hogar</button>
            <button type="button" class="btn btn-light text-start filtro-btn" data-categoria="indumentaria" data-bs-dismiss="offcanvas">Indumentaria</button>
            <button type="button" class="btn btn-light text-start filtro-btn" data-categoria="luncheras" data-bs-dismiss="offcanvas">Luncheras</button>
        </div>
      </div>
    </div> 

  <section class="py-5">
    <div class="container text-center">
      <div class="row g-4" id="tienda-container"></div> 

      <div class="d-flex justify-content-center mt-5 gap-3">
        <button id="btn-prev" class="btn btn-outline-dark mi-boton-navegacion">Anterior</button>
        <button id="btn-next" class="btn btn-dark mi-boton-navegacion">Siguiente</button>
    </div>

    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script src="./js/footer.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/tienda.js"></script>

  <div class="modal fade" id="imageZoomModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-body p-0 position-relative">
        <img src="" id="modalZoomImage" class="img-fluid rounded shadow-lg" alt="Zoom">
      </div>
    </div>
  </div>
</div>

</body>
</html>
