<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda | All In Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .product-card { background: #fff; border-radius: 8px; overflow: hidden; transition: 0.3s; height: 100%; border: 1px solid #eee; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .price { color: #d4af37; font-weight: 700; font-size: 1.2rem; }
  </style>
</head>

 
<body>
  <div id="navbar-container"></div>

  <!-- HERO SIMPLE -->
  <section class="page-hero d-flex align-items-center">
    <div class="container text-center">
      <h1>Tienda</h1>
      <p>Selección de prendas con promos impredibles...</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container text-center">
      <div class="row g-4" id="tienda-container"></div> 

      <div class="d-flex justify-content-center mt-5 gap-3">
        <button id="btn-prev" class="btn btn-outline-dark mi-boton-navegacion">Anterior</button>
        <button id="btn-next" class="btn btn-dark mi-boton-navegacion">Siguiente</button>
    </div>

    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script src="./js/footer.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/tienda.js"></script>
</body>
</html>
