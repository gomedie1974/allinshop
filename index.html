<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All In Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<section class="hero">
  <div class="container">
    <div class="row align-items-center">

      <!-- TEXTO -->
      <div class="col-lg-6 hero-text">
        <h1>Elegancia en cada detalle</h1>
        <p>Descubrí fragancias y productos exclusivos seleccionados para quienes buscan distinción.</p>
        <a href="#" class="btn btn-gold mt-4">Descubrir Colección</a>
      </div>

      <!-- IMAGEN PRODUCTO -->
      <div class="col-lg-6 text-center hero-image">
        <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" 
             alt="Perfume Premium" 
             class="img-fluid perfume-img">
      </div>

    </div>
  </div>
</section>

<section class="categories py-5">
  <div class="container text-center">
    <h2 class="section-title mb-5">Nuestras Categorías</h2>

    <div class="row g-4">

      <div class="col-md-4">
        <div class="category-card">
          <img src="https://images.unsplash.com/photo-1595429035839-c99c298ffdde" class="img-fluid" alt="Perfumes">
          <div class="category-overlay">
            <h3>Perfumes</h3>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="category-card">
          <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348" class="img-fluid" alt="Belleza">
          <div class="category-overlay">
            <h3>Belleza</h3>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="category-card">
          <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="img-fluid" alt="Bebidas">
          <div class="category-overlay">
            <h3>Bebidas</h3>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>


<section class="featured py-5">
  <div class="container text-center">
    <h2 class="section-title mb-5">Colección Destacada</h2>

    <div class="row g-4">

      <div class="col-md-4">
        <div class="product-card">
          <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" class="img-fluid" alt="Producto">
          <div class="product-info">
            <h4>Dior Sauvage 100ml</h4>
            <p class="price">$85.000</p>
            <button 
                class="btn btn-gold consultar-btn" 
                data-producto="Dior Sauvage 100ml" 
                data-precio="$85.000">
                Consultar
            </button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="product-card">
          <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" class="img-fluid" alt="Producto">
          <div class="product-info">
            <h4>Whisky Premium</h4>
            <p class="price">$60.000</p>
            <button 
                class="btn btn-gold consultar-btn" 
                data-producto="Dior Sauvage 100ml" 
                data-precio="$85.000">
                Consultar
            </button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="product-card">
          <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" class="img-fluid" alt="Producto">
          <div class="product-info">
            <h4>Set Belleza Luxury</h4>
            <p class="price">$45.000</p>
            <button 
                class="btn btn-gold consultar-btn" 
                data-producto="Dior Sauvage 100ml" 
                data-precio="$85.000">
                Consultar
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
