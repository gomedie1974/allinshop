<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Carga de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div>
<body class="bg-light">
    <div id="admin-content" style="display: none;">
        <div class="container mt-5">
           
    </div>
    <div class="container mt-5">
    <div class="row">
        <div class="col-md-5 card p-4 shadow-sm">
            <h4>➕ Producto Individual</h4>
            <form id="admin-form">
                <div class="mb-2">
                    <label class="form-label">Colección</label>
                    <select id="col-select" class="form-select">
                        <option value="bebidas">Bebidas</option>
                        <option value="perfumes">Perfumes</option>
                        <option value="belleza">Belleza</option>
                        <option value="promociones">Promociones</option>
                    </select>
                </div>
                <input type="text" id="prod-id" class="form-control mb-2" placeholder="ID (ej: malbec-reserva)" required>
                <input type="text" id="prod-nombre" class="form-control mb-2" placeholder="Nombre" required>
                <input type="text" id="prod-img" class="form-control mb-2" placeholder="Ruta Imagen (/assets/...)" required>
                <div class="row mb-2">
                    <div class="col"><input type="number" id="prod-precio" class="form-control" placeholder="Precio" required></div>
                    <div class="col"><input type="number" id="prod-stock" class="form-control" placeholder="Stock" required></div>
                </div>
                <div class="row mb-2">
                    <div class="col"><input type="text" id="prod-cat" class="form-control" placeholder="Categoría (tinto)" required></div>
                    <div class="col"><input type="number" id="prod-orden" class="form-control" placeholder="Orden" value="1"></div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="prod-destacado">
                    <label class="form-check-label">¿Es producto destacado?</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Guardar Producto</button>
            </form>
        </div>

        <div class="col-md-6 offset-md-1 card p-4 shadow-sm bg-dark text-white">
            <h4>🚀 Carga Masiva (JSON)</h4>
            <p><small>Pega aquí un array de objetos para subir hasta 500 de una vez.</small></p>
            <textarea id="json-masivo" class="form-control mb-3" rows="10" placeholder='[{"id":"vino-1", "nombre":"Vino X"...}]'></textarea>
            <button id="btn-batch" class="btn btn-warning w-100">Ejecutar Batch Write</button>
        </div>
    </div>
    <div id="mensaje" class="mt-3"></div>
</div>
 </div>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
