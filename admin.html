<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin - Carga de Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div id="admin-content">
    
<div class="d-flex justify-content-between align-items-center mt-3 m-4">
    <h1>Panel de Control</h1>
    <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
</div>

<div class="container mt-5">

<div class="row">

<!-- PRODUCTO INDIVIDUAL -->

<div class="col-md-5 card p-4 shadow-sm">

<h4>➕ Producto Individual</h4>

<form id="admin-form">

<div class="mb-2">

<label class="form-label">Colección</label>

<select id="col-select" class="form-select">
<option value="bebidas">Bebidas</option>
<option value="perfumes">Perfumes</option>
<option value="belleza">Belleza</option>
<option value="promociones">Tienda</option>
</select>

</div>

<input type="text" id="prod-id" class="form-control mb-2" placeholder="ID (ej: malbec-reserva)" required>

<input type="text" id="prod-nombre" class="form-control mb-2" placeholder="Nombre" required>

<input type="text" id="prod-descripcion" class="form-control mb-2" placeholder="Descripcion" required>

<input type="text" id="prod-img" class="form-control mb-2" placeholder="Ruta Imagen (/assets/...)" required>

<div class="row mb-2">

<div class="col">
<input type="number" id="prod-precio" class="form-control" placeholder="Precio" required>
</div>

<div class="col">
<input type="number" id="prod-stock" class="form-control" placeholder="Stock" required>
</div>

</div>

<div class="row mb-2">

<div class="col">
<input type="text" id="prod-cat" class="form-control" placeholder="Categoría (tinto)" required>
</div>

<div class="col">
<input type="number" id="prod-orden" class="form-control" placeholder="Orden" value="1">
</div>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox" id="prod-destacado">

<label class="form-check-label">
¿Es producto destacado?
</label>

</div>

<button type="submit" class="btn btn-primary w-100">
Guardar Producto
</button>

</form>

</div>


<!-- CARGA MASIVA -->

<div class="col-md-6 offset-md-1 card p-4 shadow-sm bg-dark text-white">

<h4>🚀 Carga Masiva (JSON)</h4>

<p><small>Pega aquí un array de objetos para subir hasta 500 de una vez.</small></p>

<textarea id="json-masivo" class="form-control mb-3" rows="10"
placeholder='[
{
"id": "vodka-absolut",
"nombre": "Vodka Absolut 750ml",
"descripcion": "Botella 750ml",
"precio": 18000,
"stock": 12,
"categoria": "blancas",
"imagen": "/assets/img/absolut.png",
"orden": 1,
"destacado": "true",
"activo": true
}
]'></textarea>

<button id="btn-batch" class="btn btn-warning w-100">
Ejecutar Batch Write
</button>

</div>

</div>

 

<!-- TABLA PRODUCTOS -->

<h2 class="mt-5">Productos cargados</h2>

<div class="row mb-3 mt-4">
    <div class="col-md-4">
        <label class="form-label fw-bold">🔍 Filtrar por Colección:</label>
        <select id="filtro-coleccion" class="form-select bg-white shadow-sm">
            <option value="todas">Todas las colecciones</option>
            <option value="bebidas">Bebidas</option>
            <option value="perfumes">Perfumes</option>
            <option value="belleza">Belleza</option>
            <option value="tienda">Tienda</option>
            <option value="promociones">Promociones</option>
        </select>
    </div>
</div>

<table class="table table-bordered table-striped bg-white">

<thead class="table-dark">

<tr>
<th>Imagen</th>
<th>Nombre</th>
<th>Precio</th>
<th>Stock</th>
<th>Categoría</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="listaProductos"></tbody>

</table>



<nav>
  <ul class="pagination justify-content-center" id="pagination-container">
    </ul>
</nav>

</div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
