<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragancias | All In Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="./assets/img/ALLINSHOP.png">
  <link rel="apple-touch-icon" href="./assets/img/ALLINSHOP.png">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* FIX: Evita que el Navbar tape el título (Estilo Tienda) */
    .page-hero {
        padding-top: 150px; 
        padding-bottom: 60px;
        background-color: #f8f9fa;
    }

    @media (max-width: 768px) {
        .page-hero {
            padding-top: 150px;
            padding-bottom: 40px;
        }
        .page-hero h1 { font-size: 2rem; }
    }

    /* Imagen Banner Duración */
    .img-full-width {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
        max-height: 600px; 
    }

    /* --- ESTILOS DE FILTROS (Copiado de Tienda) --- */
    .filtros-wrapper {
        padding: 10px 0;
    }

    .filtros {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    /* Estilo de los botones de filtro (Dorado All In Shop) */
    .filtro-btn {
        padding: 8px 20px;
        border: 2px solid #d4af37;
        background: transparent;
        color: #333;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
        cursor: pointer;
        white-space: nowrap;
    }

    .filtro-btn.active, .filtro-btn:hover {
        background: #d4af37;
        color: white;
    }

    /* Estilo específico para los botones dentro del Offcanvas (Móvil) */
    .offcanvas-body .filtro-btn {
        border: none;
        border-radius: 8px;
        margin-bottom: 5px;
    }

    /* Zoom y Cards */
    .img-zoomable { cursor: zoom-in; transition: 0.3s; }
    .img-zoomable:hover { filter: brightness(0.9); }
    #modalZoomImage { cursor: zoom-out; display: block; margin: 0 auto; max-height: 90vh; }

    .price { color: #d4af37; font-weight: 700; font-size: 1.2rem; }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <section class="page-hero d-flex align-items-center">
    <div class="container text-center">
      <h1 class="fw-bold">Fragancias</h1>
      <p class="lead">"Esencias <b>premium</b>. Precios únicos."</p>
    </div>
  </section>

  <img src="./assets/img/perfumes/duracionFragancias.webp" class="img-full-width mb-4" alt="Guía de duración de perfumes">

  <div class="container mt-4">
      
      <div class="filtros-wrapper d-none d-md-block mb-5">
          <div class="filtros">
              <button type="button" class="filtro-btn active" data-filter="all">Todos</button>
              <button type="button" class="filtro-btn" data-filter="cofre">Cofres</button>
              <button type="button" class="filtro-btn" data-filter="femenina">Femeninas</button>
              <button type="button" class="filtro-btn" data-filter="masculina">Masculinas</button>
              <button type="button" class="filtro-btn" data-filter="unisex">Unisex</button>
              <button type="button" class="filtro-btn" data-filter="otro">Otros</button>
          </div>
      </div>

      <div class="d-md-none text-start mb-3">
          <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasFiltros">
              <i class="bi bi-filter-left"></i> Filtrar Categorías
          </button>
      </div>

      <div class="row g-4" id="perfumes-container"></div>    

      <div class="d-flex justify-content-center mt-5 gap-3">
          <button id="btn-prev" class="btn btn-outline-dark" style="display: none;">Anterior</button>
          <button id="btn-next" class="btn btn-dark" style="display: none;">Siguiente</button>
      </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasFiltros">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Categorías</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="d-grid gap-2">
          <button type="button" class="btn btn-light text-start filtro-btn active" data-filter="all" data-bs-dismiss="offcanvas">Todos</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="cofre" data-bs-dismiss="offcanvas">Cofres</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="femenina" data-bs-dismiss="offcanvas">Femeninas</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="masculina" data-bs-dismiss="offcanvas">Masculinas</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="unisex" data-bs-dismiss="offcanvas">Unisex</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="otro" data-bs-dismiss="offcanvas">Otros</button>
      </div>
    </div>
  </div> 

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script src="./js/footer.js"></script>
  <script type="module" src="js/perfumes.js"></script>
  <script src="js/main.js"></script>
  
  <div class="modal fade" id="imageZoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
      <div class="modal-content bg-transparent border-0">
        <div class="modal-body p-0 position-relative">
          <img src="" id="modalZoomImage" class="img-fluid rounded shadow-lg" alt="Zoom">
        </div>
      </div>
    </div>
  </div>

</body>
</html>
