<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragancias | All In Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./assets/img/ALLINSHOP.png">
  <link rel="apple-touch-icon" href="./assets/img/ALLINSHOP.png">

  <link rel="stylesheet" href="css/styles.css">
</head>

<style>
  .img-full-width {
    width: 100%;
    height: auto; /* Mantiene la proporción */
    display: block;
    object-fit: cover;
    /* Opcional: si quieres que tenga un tope de altura en PC para que no ocupe toda la pantalla */
    max-height: 600px; 
}
/* Contenedor de botones */
.filtros {
    display: flex;
    flex-wrap: wrap;       /* Esto hace que los botones bajen si no entran */
    justify-content: center;
    gap: 10px;             /* Espacio entre botones */
    padding: 10px;
}

/* Botones más cómodos para tocar en el celular */
.filtro-btn {
    padding: 8px 20px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 25px;   /* Estilo redondeado moderno */
    white-space: nowrap;   /* Evita que el texto de un botón se parta en dos */
    transition: all 0.3s ease;
}

/* Ajuste para la imagen hero y el texto en móvil */
@media (max-width: 768px) {
    .page-hero h1 {
        font-size: 2rem;   /* Letra un poco más chica en móviles */
    }
    .img-full-width {
        max-height: 300px; /* Reducimos el alto de la imagen en móviles para que no tape todo */
    }
}
.img-zoomable { cursor: zoom-in; transition: 0.3s; }
.img-zoomable:hover { opacity: 0.9; }

.btn-zoom-out-custom {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    cursor: pointer;
}

.btn-zoom-out-custom i { font-size: 1.6rem; }

#modalZoomImage {
    cursor: zoom-out;
    display: block;
    margin: 0 auto;
    max-height: 90vh;
}
</style>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>
  

  <!-- HERO SIMPLE -->
  <section class="page-hero d-flex align-items-center">
    <div class="container text-center">
      <h1>Fragancias</h1>
      <p>Selección premium de fragancias, precios con descuentos.</p>
    </div>
  </section>

  <img src="./assets/img/perfumes/duracionFragancias.webp" class="img-full-width mb-4" alt="Guía de duración de perfumes">

  <!-- FILTROS -->
  <section>
    <div class="container text-center">
      
      <div class="filtros-wrapper mb-5">
        <div class="filtros">
          <button class="filtro-btn active" data-filter="all">Todos</button>
          <button class="filtro-btn" data-filter="cofre">Cofres</button>
          <button class="filtro-btn" data-filter="femenina">Femeninas</button>
          <button class="filtro-btn" data-filter="masculina">Masculinas</button>
          <button class="filtro-btn" data-filter="unisex">Unisex</button>
          <button class="filtro-btn" data-filter="otro">Otros</button>
        </div>
      </div>

    <div class="row g-4" id="perfumes-container"></div>    

    <div class="d-flex justify-content-center mt-5 gap-3">
        <button id="btn-prev" class="btn btn-outline-dark" style="display: none;">Anterior</button>
        <button id="btn-next" class="btn btn-dark" style="display: none;">Siguiente</button>
    </div>
 
 
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- SCRIPTS -->
    <script type="module" src="js/firebase.js"></script>
    <script src="./js/footer.js"></script>
    <script type="module" src="js/perfumes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  
    <div class="modal fade" id="imageZoomModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-body p-0 position-relative">
        <img src="" id="modalZoomImage" class="img-fluid rounded shadow-lg" alt="Zoom">
      </div>
    </div>
  </div>
</div>

</body>
</html>
