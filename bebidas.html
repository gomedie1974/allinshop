<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bebidas | All In Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/img/ALLINSHOP.png">
  <link rel="apple-touch-icon" href="./assets/img/ALLINSHOP.png">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* --- VIDEO HERO --- */
    .video-hero {
        position: relative;
        height: 100vh;
        overflow: hidden;
        background-color: #000;
    }

    .video-bg {
        position: absolute;
        top: 50%;
        left: 50%;
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        z-index: 0;
        transform: translate(-50%, -50%);
        object-fit: cover;
    }

    .video-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1;
    }

    .video-hero .container {
        z-index: 2;
    }

    .video-hero h1 {
        font-family: 'Playfair Display', serif;
        letter-spacing: 4px;
        text-transform: uppercase;
    }

    /* --- FILTROS ESTILO TIENDA --- */
    .filtros-wrapper {
        padding: 10px 0;
    }

    .filtros {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    /* Botón estilo Dorado All In Shop */
    .filtro-btn {
        padding: 8px 20px;
        border: 2px solid #d4af37;
        background: transparent;
        color: #333;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
        cursor: pointer;
        white-space: nowrap;
    }

    .filtro-btn.active, .filtro-btn:hover {
        background: #d4af37;
        color: white;
    }

    /* Estilo para los botones dentro del menú lateral */
    .offcanvas-body .filtro-btn {
        border: none;
        border-radius: 8px;
        margin-bottom: 5px;
    }

    .bodega-text {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 5px;
        font-weight: 500;
    }

    @media (max-width: 768px) {
        .video-hero { height: 70vh; }
        .video-hero h1 { font-size: 2.5rem; }
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <section class="video-hero d-flex align-items-center">
    <div class="video-overlay"></div> 
    <video autoplay muted loop playsinline class="video-bg">
      <source src="./assets/img/bebidas/bebidas.mp4" type="video/mp4">
      Tu navegador no soporta el formato de video.
    </video>

    <div class="container text-center text-white position-relative">
      <h1 class="display-3 fw-bold">Bebidas</h1>
      <p class="lead">Selección premium de vinos y aperitivos</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container text-center">

      <div class="filtros-wrapper d-none d-md-block mb-4">
        <div class="filtros">
            <button class="filtro-btn active" data-filter="all">Todos</button>
            <button class="filtro-btn" data-filter="aperitivos">Aperitivos</button>
            <button class="filtro-btn" data-filter="champagne">Champagne</button>
            <button class="filtro-btn" data-filter="blanco">Vino Blanco</button>
            <button class="filtro-btn" data-filter="tinto">Vino Tinto</button>
        </div>
      </div>

      <div class="d-md-none text-start mb-4">
          <button class="btn btn-outline-dark w-100 py-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasBebidas">
              <i class="bi bi-filter-left fs-4 me-2"></i> Filtrar Categorías
          </button>
      </div>

      <div id="contenedor-filtro-bodega" class="mt-3 mb-5" style="display: none;">
          <label class="text-muted small mb-2 d-block">Filtrar por Bodega:</label>
          <select id="select-bodega" class="form-select form-select-sm m-auto" style="max-width: 250px; border-radius: 20px;">
              <option value="all">Todas las bodegas</option>
          </select>
      </div>

      <div class="row g-4" id="bebidas-container"></div>    

      <div class="d-flex justify-content-center mt-5 gap-3">
          <button id="btn-prev" class="btn btn-outline-dark" style="display: none;">Anterior</button>
          <button id="btn-next" class="btn btn-dark" style="display: none;">Siguiente</button>
      </div>
    </div>
  </section>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasBebidas" aria-labelledby="offcanvasBebidasLabel">
    <div class="offcanvas-header bg-dark text-white">
      <h5 class="offcanvas-title" id="offcanvasBebidasLabel">Categorías de Bebidas</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div class="d-grid gap-2">
          <button type="button" class="btn btn-light text-start filtro-btn active" data-filter="all" data-bs-dismiss="offcanvas">Todos</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="aperitivos" data-bs-dismiss="offcanvas">Aperitivos</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="champagne" data-bs-dismiss="offcanvas">Champagne</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="blanco" data-bs-dismiss="offcanvas">Vino Blanco</button>
          <button type="button" class="btn btn-light text-start filtro-btn" data-filter="tinto" data-bs-dismiss="offcanvas">Vino Tinto</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script type="module" src="js/firebase.js"></script>
  <script src="./js/footer.js"></script>
  <script type="module" src="js/bebidas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  
  <div class="modal fade" id="imageZoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
      <div class="modal-content bg-transparent border-0">
        <div class="modal-body p-0 position-relative">
          <img src="" id="modalZoomImage" class="img-fluid rounded shadow-lg" alt="Zoom">
        </div>
      </div>
    </div>
  </div>

</body>
</html>
