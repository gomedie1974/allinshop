<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bebidas | All In Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
 
  <style>
    .video-hero {
    position: relative;
    height:100vh; /* Altura del hero, puedes subirlo a 80vh si quieres más impacto */
    overflow: hidden;
    background-color: #000; /* Fondo de respaldo mientras carga el video */
}

.video-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: 0;
    transform: translate(-50%, -50%);
    object-fit: cover; /* Esto hace que el video ocupe todo el ancho/alto */
}

.video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Oscurece el video para que el texto blanco resalte */
    z-index: 1;
}

.video-hero .container {
    z-index: 2; /* Pone el texto por encima del video y del overlay */
}

/* Ajuste para que el título se vea más elegante */
.video-hero h1 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 4px;
    text-transform: uppercase;
}
/* Contenedor de botones */
.filtros {
    display: flex;
    flex-wrap: wrap;       /* Esto hace que los botones bajen si no entran */
    justify-content: center;
    gap: 10px;             /* Espacio entre botones */
    padding: 10px;
}

/* Botones más cómodos para tocar en el celular */
.filtro-btn {
    padding: 8px 20px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 25px;   /* Estilo redondeado moderno */
    white-space: nowrap;   /* Evita que el texto de un botón se parta en dos */
    transition: all 0.3s ease;
}

/* Ajuste para la imagen hero y el texto en móvil */
@media (max-width: 768px) {
    .page-hero h1 {
        font-size: 2rem;   /* Letra un poco más chica en móviles */
    }
    .img-full-width {
        max-height: 300px; /* Reducimos el alto de la imagen en móviles para que no tape todo */
    }
}
  </style>


<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>
  

  <!-- HERO  -->

<section class="video-hero d-flex align-items-center">
  <div class="video-overlay"></div> <video autoplay muted loop playsinline class="video-bg">
    <source src="./assets/img/bebidas/bebidas.mp4" type="video/mp4">
    Tu navegador no soporta el formato de video.
  </video>

  <div class="container text-center text-white position-relative">
    <h1 class="display-3 fw-bold">Bebidas</h1>
    <p class="lead">Selección premium de vinos y aperitivos</p>
  </div>
</section>

  <!-- FILTROS -->
  <section class="py-5">
    <div class="container text-center">

      <div class="filtros-wrapper mb-5">
        <div class="filtros">
            <button class="filtro-btn active" data-filter="all">Todos</button>
            <button class="filtro-btn" data-filter="aperitivos">Aperitivos</button>
            <button class="filtro-btn" data-filter="champagne">Champagne</button>
            <button class="filtro-btn" data-filter="blanco">Vino Blanco</button>
            <button class="filtro-btn" data-filter="tinto">Vino Tinto</button>
        </div>
      </div>

    <div class="row g-4" id="bebidas-container"></div>    

    <div class="d-flex justify-content-center mt-5 gap-3">
        <button id="btn-prev" class="btn btn-outline-dark" style="display: none;">Anterior</button>
        <button id="btn-next" class="btn btn-dark" style="display: none;">Siguiente</button>
    </div>
 
 
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- SCRIPTS -->
    <script type="module" src="js/firebase.js"></script>
    <script src="./js/footer.js"></script>
    <script type="module" src="js/bebidas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  

</body>
</html>
