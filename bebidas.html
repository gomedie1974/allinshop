<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bebidas | All In Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>
  

  <!-- HERO SIMPLE -->
  <section class="page-hero d-flex align-items-center">
    <div class="container text-center">
      <h1>Bebidas</h1>
      <p>Selección premium de vinos y aperitivos</p>
    </div>
  </section>

  <!-- FILTROS -->
  <section class="py-5">
    <div class="container text-center">

      <div class="filtros-wrapper mb-5">
        <div class="filtros">
            <button class="filtro-btn active" data-filter="all">Todos</button>
            <button class="filtro-btn" data-filter="aperitivos">Aperitivos</button>
            <button class="filtro-btn" data-filter="champagne">Champagne</button>
            <button class="filtro-btn" data-filter="blanco">Vino Blanco</button>
            <button class="filtro-btn" data-filter="tinto">Vino Tinto</button>
        </div>
      </div>

    <div class="row g-4" id="bebidas-container"></div>    

    <div class="d-flex justify-content-center mt-5 gap-3">
        <button id="btn-prev" class="btn btn-outline-dark" style="display: none;">Anterior</button>
        <button id="btn-next" class="btn btn-dark" style="display: none;">Siguiente</button>
    </div>
 
 
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- SCRIPTS -->
    <script type="module" src="js/firebase.js"></script>
    <script src="./js/footer.js"></script>
    <script type="module" src="js/bebidas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  

</body>
</html>
